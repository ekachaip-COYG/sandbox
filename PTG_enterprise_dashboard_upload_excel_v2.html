<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ITBP Enterprise System Project Insight</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap');
        body { font-family: 'Sarabun', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.5); }
        .filter-dropdown { position: relative; display: inline-block; width: 100%; }
        .dropdown-content {
            display: none;
            position: absolute;
            background-color: white;
            min-width: 260px;
            box-shadow: 0px 20px 25px -5px rgba(0, 0, 0, 0.1);
            z-index: 50;
            max-height: 400px;
            overflow-y: auto;
            border-radius: 1.25rem;
            margin-top: 10px;
            border: 1px solid #f1f5f9;
        }
        .filter-dropdown:hover .dropdown-content { display: block; }
        .detail-row { display: none; background-color: #f8fafc; }
        .detail-active { display: table-row; }
        .sort-btn:hover { color: #6366f1; cursor: pointer; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-7xl mx-auto">
        <header class="mb-10 flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
            <div>
                <h1 class="text-3xl md:text-4xl font-extrabold text-slate-900 tracking-tight">ITBP <span class="text-indigo-600">Enterprise System</span> Project Insight</h1>
                <p class="text-slate-500 mt-2 font-medium flex items-center gap-2">
                    <span class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span>
                    Operational Intelligence Dashboard v2026
                </p>
            </div>
            <div class="flex flex-col items-end gap-2">

		<div class="flex items-center gap-4">
    			<button id="clearBtn" onclick="clearStoredData()" class="hidden text-rose-500 hover:text-rose-700 text-sm font-bold transition-colors">
        		🗑️ Clear Stored Data
    			</button>
    			<button onclick="syncFromSheet()" class="bg-emerald-600 hover:bg-emerald-700 text-white px-8 py-3.5 rounded-2xl transition-all duration-300 shadow-xl font-bold flex items-center gap-3">
        		🔄 Sync from Google Sheet
    			</button>
    			<input type="file" id="excelFile" accept=".xlsx, .xls" class="hidden" onchange="handleFile(this)">
    			<button onclick="document.getElementById('excelFile').click()" class="bg-slate-900 hover:bg-indigo-600 text-white px-6 py-3.5 rounded-2xl transition-all duration-300 shadow-xl font-bold flex items-center gap-3">
        		📁 Import File
    		</button>
	</div>
                <p id="lastUploadText" class="text-[10px] text-slate-400 font-medium italic hidden"></p>
            </div>
        </header>

        <div class="grid grid-cols-2 lg:grid-cols-4 gap-6 mb-10">
            <div class="glass-card p-6 rounded-3xl shadow-sm border border-slate-100 text-center md:text-left">
                <p class="text-[11px] text-slate-400 font-bold uppercase tracking-widest">Active Projects</p>
                <p id="totalCount" class="text-4xl font-black text-slate-800 mt-2">0</p>
            </div>
            <div class="glass-card p-6 rounded-3xl shadow-sm border-b-4 border-emerald-500">
                <p class="text-[11px] text-slate-400 font-bold uppercase tracking-widest text-emerald-600">Completed</p>
                <p id="completedCount" class="text-4xl font-black text-emerald-600 mt-2">0</p>
            </div>
            <div class="glass-card p-6 rounded-3xl shadow-sm border-b-4 border-amber-500">
                <p class="text-[11px] text-slate-400 font-bold uppercase tracking-widest text-amber-600">In Progress</p>
                <p id="progressCount" class="text-4xl font-black text-amber-600 mt-2">0</p>
            </div>
            <div class="glass-card p-6 rounded-3xl shadow-sm border-b-4 border-rose-500">
                <p class="text-[11px] text-slate-400 font-bold uppercase tracking-widest text-rose-600">On Hold</p>
                <p id="onHoldCount" class="text-4xl font-black text-rose-600 mt-2">0</p>
            </div>
        </div>

        <div class="bg-white p-6 rounded-3xl shadow-xl shadow-slate-200/50 mb-10 grid grid-cols-1 md:grid-cols-3 lg:grid-cols-5 gap-6">
            <div>
                <label class="block text-xs font-bold text-slate-500 mb-2 ml-1">Search</label>
                <input type="text" id="searchBox" placeholder="Project name..." oninput="filterData()" class="w-full bg-slate-50 border-none rounded-2xl px-5 py-3 text-sm focus:ring-2 focus:ring-indigo-500 outline-none transition">
            </div>
            <div id="filterContainers" class="contents"></div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-10">
            <div class="glass-card p-8 rounded-[2rem] shadow-sm h-[450px] flex flex-col">
                <h3 class="font-bold text-xl text-slate-800 mb-6">Status Overview</h3>
                <div class="flex-grow">
                    <canvas id="statusPieChart"></canvas>
                </div>
            </div>

            <div class="lg:col-span-2 bg-white rounded-[2rem] shadow-xl overflow-hidden border border-slate-100">
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="bg-slate-50/50 text-slate-400 font-bold uppercase text-[10px] tracking-widest border-b">
                            <tr>
                                <th class="px-6 py-5 text-center w-10"></th>
                                <th class="px-4 py-5">Project Details</th>
                                <th class="px-6 py-5">Status</th>
                                <th class="px-6 py-5">Progress</th>
                                <th class="px-6 py-5 text-center sort-btn" onclick="sortDataByAging()">Aging <span id="sortIcon">↕</span></th>
                            </tr>
                        </thead>
                        <tbody id="tableBody" class="divide-y divide-slate-50">
                            <tr><td colspan="5" class="px-6 py-32 text-center text-slate-300 italic">Please import dataset...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        let rawData = [];
        let filteredData = [];
        let chartInstance = null;
        let sortDirection = 1;
        const TARGET_SHEET = "PBI_ProjectData";
        const STORAGE_KEY = "itbp_dashboard_data";
        const TIME_KEY = "itbp_last_upload_time";

        const statusColors = { 'Completed': '#10b981', 'On Hold': '#f43f5e', 'In Progress': '#6366f1', 'Test': '#f59e0b', 'Development': '#a855f7' };
        const palette = ['#ec4899', '#8b5cf6', '#14b8a6', '#f97316', '#0ea5e9'];

        window.onload = function() {
            const savedData = localStorage.getItem(STORAGE_KEY);
            const savedTime = localStorage.getItem(TIME_KEY);
            
            if (savedData) {
                rawData = JSON.parse(savedData);
                // กรองเฉพาะที่มี Status ตั้งแต่ตอนโหลด
                rawData = rawData.filter(item => item.Status && String(item.Status).trim() !== "");
                
                document.getElementById('clearBtn').classList.remove('hidden');
                if(savedTime) {
                    const timeEl = document.getElementById('lastUploadText');
                    timeEl.textContent = `Last Upload: ${savedTime}`;
                    timeEl.classList.remove('hidden');
                }
                setupFilters();
                filterData();
            }
        };

        function handleFile(input) {
            const file = input.files[0];
            const reader = new FileReader();
            reader.onload = function(e) {
                const workbook = XLSX.read(new Uint8Array(e.target.result), {type: 'array'});
                if (!workbook.SheetNames.includes(TARGET_SHEET)) return alert("Sheet not found!");
                
                let data = XLSX.utils.sheet_to_json(workbook.Sheets[TARGET_SHEET]);
                
                // ✅ กฎข้อที่ 1: ถ้า status ไม่มีค่า ไม่ต้องนำมาแสดงและนับ
                rawData = data.filter(item => item.Status && String(item.Status).trim() !== "");

                // ✅ กฎข้อที่ 2: บันทึกวันเวลาที่ upload
                const now = new Date();
                const timeString = now.toLocaleString('th-TH', { 
                    day: '2-digit', month: 'short', year: 'numeric', 
                    hour: '2-digit', minute: '2-digit', second: '2-digit' 
                });
                
                localStorage.setItem(STORAGE_KEY, JSON.stringify(rawData));
                localStorage.setItem(TIME_KEY, timeString);
                
                document.getElementById('clearBtn').classList.remove('hidden');
                const timeEl = document.getElementById('lastUploadText');
                timeEl.textContent = `Last Upload: ${timeString}`;
                timeEl.classList.remove('hidden');

                setupFilters();
                filterData();
            };
            reader.readAsArrayBuffer(file);
        }

        function clearStoredData() {
            if(confirm("ต้องการล้างข้อมูลที่บันทึกไว้ใช่หรือไม่?")) {
                localStorage.removeItem(STORAGE_KEY);
                localStorage.removeItem(TIME_KEY);
                location.reload();
            }
        }

        function setupFilters() {
            const configs = [
                { id: 'pm', label: 'Project Manager', field: 'ProjectManager' },
                { id: 'status', label: 'Status', field: 'Status' },
                { id: 'meeting', label: 'IT Meeting', field: 'ITMeeting' },
                { id: 'year', label: 'Year', field: 'Year' }
            ];
            
            const container = document.getElementById('filterContainers');
            container.innerHTML = configs.map(conf => `
                <div class="filter-dropdown">
                    <label class="block text-xs font-bold text-slate-500 mb-2 ml-1">${conf.label}</label>
                    <button id="${conf.id}Btn" class="w-full bg-slate-50 text-slate-700 px-5 py-3 rounded-2xl text-sm text-left flex justify-between items-center font-semibold">
                        <span>All ${conf.label}s</span>
                        <svg class="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 9l-7 7-7-7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></svg>
                    </button>
                    <div class="dropdown-content p-3">
                        <div class="flex justify-between p-2 border-b mb-2">
                            <button onclick="toggleAll('${conf.field}', true)" class="text-[10px] font-bold text-indigo-600 uppercase">Select All</button>
                            <button onclick="toggleAll('${conf.field}', false)" class="text-[10px] font-bold text-slate-400 uppercase">Clear</button>
                        </div>
                        <div class="space-y-1">
                            ${[...new Set(rawData.map(i => i[conf.field]).filter(Boolean))].sort().map(val => `
                                <label class="flex items-center gap-3 p-2 rounded-xl cursor-pointer hover:bg-slate-50">
                                    <input type="checkbox" value="${val}" class="filter-checkbox w-4 h-4 rounded text-indigo-600" data-field="${conf.field}" onchange="filterData()">
                                    <span class="text-sm text-slate-600 font-semibold">${val}</span>
                                </label>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function toggleAll(field, isSelectAll) {
            document.querySelectorAll(`.filter-checkbox[data-field="${field}"]`).forEach(cb => cb.checked = isSelectAll);
            filterData();
        }

        function filterData() {
            const search = document.getElementById('searchBox').value.toLowerCase();
            const fieldMap = { 'ProjectManager': 'pmBtn', 'Status': 'statusBtn', 'ITMeeting': 'meetingBtn', 'Year': 'yearBtn' };
            const selections = {};

            Object.entries(fieldMap).forEach(([field, btnId]) => {
                const checked = Array.from(document.querySelectorAll(`.filter-checkbox[data-field="${field}"]:checked`)).map(cb => cb.value);
                const btn = document.getElementById(btnId);
                if(btn) {
                    btn.querySelector('span').textContent = checked.length ? `${field} (${checked.length})` : `All ${field}s`;
                    checked.length ? btn.classList.add('bg-indigo-50','text-indigo-700','border-indigo-100') : btn.classList.remove('bg-indigo-50','text-indigo-700','border-indigo-100');
                }
                selections[field] = checked;
            });

            filteredData = rawData.filter(item => {
                return (String(item.ProjectName || '').toLowerCase().includes(search)) &&
                       (!selections.ProjectManager.length || selections.ProjectManager.includes(String(item.ProjectManager))) &&
                       (!selections.Status.length || selections.Status.includes(String(item.Status))) &&
                       (!selections.ITMeeting.length || selections.ITMeeting.includes(String(item.ITMeeting))) &&
                       (!selections.Year.length || selections.Year.includes(String(item.Year)));
            });
            updateUI();
        }

        function sortDataByAging() {
            sortDirection *= -1;
            document.getElementById('sortIcon').textContent = sortDirection === 1 ? '▲' : '▼';
            filteredData.sort((a, b) => ((parseInt(a.Aging) || 0) - (parseInt(b.Aging) || 0)) * sortDirection);
            updateUI();
        }

        function formatMultiLine(text) {
            if (!text) return '<span class="text-slate-300 italic">No data recorded.</span>';
            const lines = String(text).split('-').map(l => l.trim()).filter(l => l.length > 0);
            if (lines.length <= 1 && !String(text).startsWith('-')) return text;
            return `<ul class="list-none space-y-2">
                ${lines.map(line => `<li class="flex gap-2">
                    <span class="text-indigo-400 font-bold">•</span>
                    <span>${line}</span>
                </li>`).join('')}
            </ul>`;
        }

        function updateUI() {
            // ✅ จำนวนสรุปจะนับจาก filteredData ซึ่งกรอง Status ว่างออกไปแล้วตั้งแต่ต้น
            document.getElementById('totalCount').textContent = filteredData.length;
            document.getElementById('completedCount').textContent = filteredData.filter(i => i.Status === 'Completed').length;
            document.getElementById('progressCount').textContent = filteredData.filter(i => ['In Progress','Test','Development'].includes(i.Status)).length;
            document.getElementById('onHoldCount').textContent = filteredData.filter(i => i.Status === 'On Hold').length;

            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = filteredData.map((item, index) => {
                let prog = (parseFloat(item.Progress) || 0) * (item.Progress <= 1 ? 100 : 1);
                let aging = parseInt(item.Aging) || 0;
                let agingClass = aging < 0 ? 'text-rose-600 bg-rose-50' : aging > 0 ? 'text-emerald-600 bg-emerald-50' : 'text-slate-400 bg-slate-50';

                return `
                    <tr class="hover:bg-slate-50 transition-all cursor-pointer group" onclick="toggleDetail(${index})">
                        <td class="px-6 py-6 text-center">
                            <svg id="icon-${index}" class="w-4 h-4 text-slate-300 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 9l-7 7-7-7" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"></path></svg>
                        </td>
                        <td class="px-4 py-6">
                            <div class="font-bold text-slate-800 text-base">${item.ProjectName || '-'}</div>
                            <div class="text-[10px] text-slate-400 font-bold uppercase mt-1 tracking-widest">${item.ProjectManager || '-'}</div>
                        </td>
                        <td class="px-6 py-6">
                            <span class="px-3 py-1 rounded-xl text-[10px] font-black uppercase ${item.Status === 'Completed' ? 'bg-emerald-100 text-emerald-700' : item.Status === 'On Hold' ? 'bg-rose-100 text-rose-700' : 'bg-indigo-100 text-indigo-700'}">${item.Status || '-'}</span>
                        </td>
                        <td class="px-6 py-6">
                            <div class="flex items-center gap-3">
                                <div class="w-12 bg-slate-100 rounded-full h-1.5 overflow-hidden"><div class="bg-indigo-500 h-full" style="width: ${prog}%"></div></div>
                                <span class="text-[11px] font-black text-slate-600">${Math.round(prog)}%</span>
                            </div>
                        </td>
                        <td class="px-6 py-6 text-center"><span class="px-3 py-1.5 rounded-lg text-xs font-bold ${agingClass}">${aging > 0 ? '+' : ''}${aging}d</span></td>
                    </tr>
                    <tr id="detail-${index}" class="detail-row">
                        <td colspan="5" class="px-10 py-8 bg-slate-50/50">
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                                <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100">
                                    <h4 class="text-[10px] font-black text-indigo-600 uppercase tracking-widest mb-3 flex items-center gap-2">
                                        <span class="w-2 h-2 bg-indigo-500 rounded-full"></span> Key Highlight
                                    </h4>
                                    <div class="text-sm text-slate-600 leading-relaxed font-medium">
                                        ${formatMultiLine(item.KeyHighlight)}
                                    </div>
                                </div>
                                <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100">
                                    <h4 class="text-[10px] font-black text-emerald-600 uppercase tracking-widest mb-3 flex items-center gap-2">
                                        <span class="w-2 h-2 bg-emerald-500 rounded-full"></span> Next Steps
                                    </h4>
                                    <div class="text-sm text-slate-600 leading-relaxed font-medium">
                                        ${formatMultiLine(item.NextStep)}
                                    </div>
                                </div>
                            </div>
                        </td>
                    </tr>
                `;
            }).join('') || '<tr><td colspan="5" class="px-6 py-20 text-center text-slate-300">No projects found.</td></tr>';
            renderChart(filteredData);
        }

        function toggleDetail(index) {
            const row = document.getElementById(`detail-${index}`);
            const icon = document.getElementById(`icon-${index}`);
            const isActive = row.classList.contains('detail-active');
            row.classList.toggle('detail-active');
            if(icon) icon.style.transform = isActive ? 'rotate(0deg)' : 'rotate(180deg)';
        }

        function renderChart(data) {
            const counts = {};
            data.forEach(i => { counts[i.Status] = (counts[i.Status] || 0) + 1; });
            const labels = Object.keys(counts);
            const colors = labels.map((l, idx) => statusColors[l] || palette[idx % palette.length]);
            const ctx = document.getElementById('statusPieChart').getContext('2d');
            if (chartInstance) chartInstance.destroy();
            chartInstance = new Chart(ctx, {
                type: 'doughnut',
                data: { labels: labels, datasets: [{ data: Object.values(counts), backgroundColor: colors, borderWidth: 0, hoverOffset: 25 }] },
                options: { maintainAspectRatio: false, cutout: '75%', plugins: { legend: { position: 'bottom', labels: { usePointStyle: true, font: { family: 'Sarabun', weight: 'bold', size: 12 }, padding: 25 } } } }
            });
        }

window.onload = function() {
        const savedData = localStorage.getItem(STORAGE_KEY);
        const savedTime = localStorage.getItem(TIME_KEY);
        
        if (savedData) {
            rawData = JSON.parse(savedData);
            rawData = rawData.filter(item => item.Status && String(item.Status).trim() !== "");
            
            document.getElementById('clearBtn').classList.remove('hidden');
            if(savedTime) {
                const timeEl = document.getElementById('lastUploadText');
                timeEl.textContent = `Last Upload: ${savedTime}`;
                timeEl.classList.remove('hidden');
            }
            setupFilters();
            filterData();
        } else {
            // ✨ ถ้าไม่มีข้อมูลในเครื่อง ให้เรียก Sync จาก Google Sheet อัตโนมัติในครั้งแรก
            syncFromSheet(); 
        }
    };

// ฟังก์ชันดึงข้อมูลจาก Google Sheet ผ่าน Apps Script
function syncFromSheet() {
    const btn = event.currentTarget;
    const originalText = btn.innerHTML;
    btn.innerHTML = "⌛ Loading...";
    btn.disabled = true;

    google.script.run.withSuccessHandler(function(response) {
        btn.innerHTML = originalText;
        btn.disabled = false;

        if (response.error) {
            alert("Error: " + response.error);
            return;
        }

        // กรอง Status ว่างออกตามเงื่อนไข
        rawData = response.data.filter(item => item.Status && String(item.Status).trim() !== "");
        
        // บันทึกค่า
        localStorage.setItem(STORAGE_KEY, JSON.stringify(rawData));
        localStorage.setItem(TIME_KEY, response.time + " (via Google Sheet)");

        document.getElementById('clearBtn').classList.remove('hidden');
        const timeEl = document.getElementById('lastUploadText');
        timeEl.textContent = `Last Sync: ${response.time} (Google Sheet)`;
        timeEl.classList.remove('hidden');

        setupFilters();
        filterData();
        alert("Sync ข้อมูลจาก Google Sheet สำเร็จ!");
    }).getSheetData();
}
    </script>
</body>
</html>
